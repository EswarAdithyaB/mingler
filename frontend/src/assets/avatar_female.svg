<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background glow -->
    <radialGradient id="f_bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#C4A882" stop-opacity="0.35"/>
      <stop offset="100%" stop-color="#1a1020" stop-opacity="0"/>
    </radialGradient>
    <!-- Skin gradient -->
    <radialGradient id="f_skin" cx="48%" cy="42%" r="52%">
      <stop offset="0%" stop-color="#FDDBB8"/>
      <stop offset="60%" stop-color="#F2C49A"/>
      <stop offset="100%" stop-color="#D9A87A"/>
    </radialGradient>
    <!-- Hair gradient -->
    <linearGradient id="f_hair" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#F5DFA0"/>
      <stop offset="40%" stop-color="#D4B06A"/>
      <stop offset="100%" stop-color="#A07830"/>
    </linearGradient>
    <!-- Hair shine -->
    <radialGradient id="f_hair_shine" cx="45%" cy="20%" r="40%">
      <stop offset="0%" stop-color="#FFFAE0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#D4B06A" stop-opacity="0"/>
    </radialGradient>
    <!-- Eye gradient -->
    <radialGradient id="f_eye_l" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8EC8F0"/>
      <stop offset="50%" stop-color="#5A9CC5"/>
      <stop offset="100%" stop-color="#2B6A9A"/>
    </radialGradient>
    <radialGradient id="f_eye_r" cx="40%" cy="35%" r="60%">
      <stop offset="0%" stop-color="#8EC8F0"/>
      <stop offset="50%" stop-color="#5A9CC5"/>
      <stop offset="100%" stop-color="#2B6A9A"/>
    </radialGradient>
    <!-- Lip gradient -->
    <linearGradient id="f_lip" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#E8857A"/>
      <stop offset="100%" stop-color="#C4584C"/>
    </linearGradient>
    <!-- Cheek blush -->
    <radialGradient id="f_blush_l" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAAA0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFAAA0" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="f_blush_r" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFAAA0" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FFAAA0" stop-opacity="0"/>
    </radialGradient>
    <!-- Neck shadow -->
    <linearGradient id="f_neck" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#EAB98C"/>
      <stop offset="100%" stop-color="#C9966A"/>
    </linearGradient>
    <!-- Shirt -->
    <linearGradient id="f_shirt" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#2A2A3A"/>
      <stop offset="100%" stop-color="#1A1A28"/>
    </linearGradient>
    <filter id="f_soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="f_softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2"/>
    </filter>
    <clipPath id="f_circle">
      <circle cx="100" cy="100" r="98"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <circle cx="100" cy="100" r="100" fill="#111118"/>
  <!-- Warm glow behind head -->
  <ellipse cx="100" cy="85" rx="70" ry="70" fill="url(#f_bg)"/>

  <g clip-path="url(#f_circle)">

    <!-- ── SHIRT / SHOULDERS ── -->
    <path d="M30 200 Q40 155 100 148 Q160 155 170 200 Z" fill="url(#f_shirt)"/>
    <!-- Collar shadow -->
    <path d="M78 150 Q100 158 122 150 L118 160 Q100 165 82 160 Z" fill="rgba(0,0,0,0.25)"/>

    <!-- ── NECK ── -->
    <path d="M88 138 Q88 152 100 154 Q112 152 112 138 L110 128 Q100 132 90 128 Z" fill="url(#f_neck)"/>
    <!-- Neck shadow sides -->
    <path d="M88 138 Q86 145 88 152 Q90 148 90 138 Z" fill="rgba(0,0,0,0.12)"/>
    <path d="M112 138 Q114 145 112 152 Q110 148 110 138 Z" fill="rgba(0,0,0,0.12)"/>

    <!-- ── HAIR BACK LAYER ── -->
    <!-- Left side hair -->
    <path d="M42 85 Q38 110 42 135 Q50 155 65 158 Q68 145 70 135 Q62 120 60 100 Q58 80 62 62 Z" fill="#C4A050"/>
    <!-- Right side hair -->
    <path d="M158 85 Q162 110 158 135 Q150 155 135 158 Q132 145 130 135 Q138 120 140 100 Q142 80 138 62 Z" fill="#C4A050"/>

    <!-- ── FACE BASE ── -->
    <ellipse cx="100" cy="98" rx="48" ry="55" fill="url(#f_skin)"/>

    <!-- Face shadow – temples -->
    <ellipse cx="56" cy="90" rx="12" ry="20" fill="rgba(180,130,80,0.2)" filter="url(#f_softer)"/>
    <ellipse cx="144" cy="90" rx="12" ry="20" fill="rgba(180,130,80,0.2)" filter="url(#f_softer)"/>

    <!-- Face shadow – jaw -->
    <ellipse cx="100" cy="148" rx="30" ry="10" fill="rgba(160,110,60,0.25)" filter="url(#f_softer)"/>

    <!-- ── HAIR FRONT ── -->
    <!-- Main top hair -->
    <path d="M52 72 Q54 45 100 38 Q146 45 148 72 Q135 58 118 55 Q110 52 100 52 Q90 52 82 55 Q65 58 52 72 Z" fill="url(#f_hair)"/>
    <!-- Hair shine -->
    <path d="M60 65 Q75 45 100 42 Q125 45 140 65 Q125 52 100 50 Q75 52 60 65 Z" fill="url(#f_hair_shine)" filter="url(#f_soft)"/>

    <!-- Left parted side bang -->
    <path d="M52 72 Q48 80 46 95 Q50 88 56 82 Q58 75 62 68 Z" fill="#D4B06A"/>
    <!-- Right side -->
    <path d="M148 72 Q152 80 154 95 Q150 88 144 82 Q142 75 138 68 Z" fill="#D4B06A"/>

    <!-- Bob hair left -->
    <path d="M52 72 Q44 95 46 115 Q50 130 58 140 Q62 130 65 118 Q62 105 60 88 Z" fill="url(#f_hair)"/>
    <!-- Bob hair right -->
    <path d="M148 72 Q156 95 154 115 Q150 130 142 140 Q138 130 135 118 Q138 105 140 88 Z" fill="url(#f_hair)"/>

    <!-- Bob ends curved inward -->
    <path d="M58 140 Q68 155 82 156 Q80 148 75 142 Q66 138 58 140 Z" fill="#C4A050"/>
    <path d="M142 140 Q132 155 118 156 Q120 148 125 142 Q134 138 142 140 Z" fill="#C4A050"/>

    <!-- ── EYEBROWS ── -->
    <path d="M72 82 Q80 78 90 80" stroke="#8A6A30" stroke-width="2.2" stroke-linecap="round" fill="none"/>
    <path d="M110 80 Q120 78 128 82" stroke="#8A6A30" stroke-width="2.2" stroke-linecap="round" fill="none"/>

    <!-- ── EYES ── -->
    <!-- Left eye -->
    <ellipse cx="82" cy="96" rx="11" ry="9" fill="white"/>
    <ellipse cx="82" cy="97" rx="8" ry="7.5" fill="url(#f_eye_l)"/>
    <ellipse cx="82" cy="97" rx="5" ry="5" fill="#1A3F60"/>
    <ellipse cx="82" cy="97" rx="3" ry="3" fill="#0A1828"/>
    <!-- Eye shine -->
    <ellipse cx="79" cy="94" rx="2" ry="1.5" fill="white" opacity="0.9"/>
    <ellipse cx="85" cy="99" rx="1" ry="0.8" fill="white" opacity="0.5"/>
    <!-- Upper eyelid line -->
    <path d="M71 93 Q82 88 93 93" stroke="#3A2010" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Lower lash line -->
    <path d="M73 100 Q82 103 91 100" stroke="#7A5030" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6"/>

    <!-- Right eye -->
    <ellipse cx="118" cy="96" rx="11" ry="9" fill="white"/>
    <ellipse cx="118" cy="97" rx="8" ry="7.5" fill="url(#f_eye_r)"/>
    <ellipse cx="118" cy="97" rx="5" ry="5" fill="#1A3F60"/>
    <ellipse cx="118" cy="97" rx="3" ry="3" fill="#0A1828"/>
    <!-- Eye shine -->
    <ellipse cx="115" cy="94" rx="2" ry="1.5" fill="white" opacity="0.9"/>
    <ellipse cx="121" cy="99" rx="1" ry="0.8" fill="white" opacity="0.5"/>
    <!-- Upper eyelid line -->
    <path d="M107 93 Q118 88 129 93" stroke="#3A2010" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <!-- Lower lash line -->
    <path d="M109 100 Q118 103 127 100" stroke="#7A5030" stroke-width="0.8" stroke-linecap="round" fill="none" opacity="0.6"/>

    <!-- ── CHEEK BLUSH ── -->
    <ellipse cx="72" cy="108" rx="14" ry="8" fill="url(#f_blush_l)"/>
    <ellipse cx="128" cy="108" rx="14" ry="8" fill="url(#f_blush_r)"/>

    <!-- ── NOSE ── -->
    <path d="M97 108 Q100 116 103 108" stroke="#D09060" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.7"/>
    <!-- Nostril hints -->
    <ellipse cx="96" cy="116" rx="2.5" ry="1.5" fill="rgba(180,110,60,0.35)"/>
    <ellipse cx="104" cy="116" rx="2.5" ry="1.5" fill="rgba(180,110,60,0.35)"/>

    <!-- ── LIPS ── -->
    <!-- Upper lip -->
    <path d="M88 125 Q94 121 100 122 Q106 121 112 125 Q106 123 100 124 Q94 123 88 125 Z" fill="url(#f_lip)"/>
    <!-- Lower lip -->
    <path d="M88 125 Q94 132 100 133 Q106 132 112 125 Q106 128 100 129 Q94 128 88 125 Z" fill="#E07068"/>
    <!-- Lip shine -->
    <ellipse cx="100" cy="128" rx="6" ry="2" fill="rgba(255,200,190,0.4)" filter="url(#f_soft)"/>
    <!-- Lip line -->
    <path d="M88 125 Q100 127 112 125" stroke="#B84840" stroke-width="0.8" fill="none" opacity="0.5"/>

    <!-- ── HAIR OVERLAY (front strands) ── -->
    <path d="M65 60 Q62 72 62 88 Q64 78 68 70 Z" fill="#D4B06A" opacity="0.7"/>
    <path d="M82 52 Q78 65 80 80 Q82 68 86 58 Z" fill="#E8CC80" opacity="0.5"/>

  </g>

  <!-- Subtle rim light -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(255,220,160,0.08)" stroke-width="2"/>
</svg>
