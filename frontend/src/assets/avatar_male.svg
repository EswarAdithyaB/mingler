<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Background glow -->
    <radialGradient id="m_bg" cx="50%" cy="40%" r="55%">
      <stop offset="0%" stop-color="#7090C0" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#0d1020" stop-opacity="0"/>
    </radialGradient>
    <!-- Skin gradient -->
    <radialGradient id="m_skin" cx="48%" cy="40%" r="52%">
      <stop offset="0%" stop-color="#F0C898"/>
      <stop offset="60%" stop-color="#DBA878"/>
      <stop offset="100%" stop-color="#C08858"/>
    </radialGradient>
    <!-- Hair gradient – dark brown -->
    <linearGradient id="m_hair" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#5A4020"/>
      <stop offset="50%" stop-color="#3A2810"/>
      <stop offset="100%" stop-color="#20180A"/>
    </linearGradient>
    <!-- Hair shine -->
    <radialGradient id="m_hair_shine" cx="42%" cy="18%" r="38%">
      <stop offset="0%" stop-color="#8A6A40" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#3A2810" stop-opacity="0"/>
    </radialGradient>
    <!-- Eye gradient – dark teal/grey -->
    <radialGradient id="m_eye_l" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#70A0A8"/>
      <stop offset="50%" stop-color="#4A7880"/>
      <stop offset="100%" stop-color="#2A5058"/>
    </radialGradient>
    <radialGradient id="m_eye_r" cx="38%" cy="32%" r="60%">
      <stop offset="0%" stop-color="#70A0A8"/>
      <stop offset="50%" stop-color="#4A7880"/>
      <stop offset="100%" stop-color="#2A5058"/>
    </radialGradient>
    <!-- Lip gradient -->
    <linearGradient id="m_lip" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#C07860"/>
      <stop offset="100%" stop-color="#A05840"/>
    </linearGradient>
    <!-- Neck gradient -->
    <linearGradient id="m_neck" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#D4A070"/>
      <stop offset="100%" stop-color="#B07848"/>
    </linearGradient>
    <!-- Shirt -->
    <linearGradient id="m_shirt" x1="30%" y1="0%" x2="70%" y2="100%">
      <stop offset="0%" stop-color="#1C2A3A"/>
      <stop offset="100%" stop-color="#0E1820"/>
    </linearGradient>
    <filter id="m_soft" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="0.8"/>
    </filter>
    <filter id="m_softer" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2.5"/>
    </filter>
    <clipPath id="m_circle">
      <circle cx="100" cy="100" r="98"/>
    </clipPath>
  </defs>

  <!-- Dark background -->
  <circle cx="100" cy="100" r="100" fill="#0E1118"/>
  <!-- Cool glow behind head -->
  <ellipse cx="100" cy="82" rx="68" ry="68" fill="url(#m_bg)"/>

  <g clip-path="url(#m_circle)">

    <!-- ── SHIRT / SHOULDERS ── -->
    <!-- Jacket/shirt shoulders - broader for male -->
    <path d="M15 200 Q25 148 100 140 Q175 148 185 200 Z" fill="url(#m_shirt)"/>
    <!-- Collar -->
    <path d="M82 143 Q100 150 118 143 L114 155 Q100 160 86 155 Z" fill="rgba(255,255,255,0.06)"/>
    <!-- Jacket lapels -->
    <path d="M82 143 Q88 152 100 158 L96 172 Q86 162 78 150 Z" fill="#243040"/>
    <path d="M118 143 Q112 152 100 158 L104 172 Q114 162 122 150 Z" fill="#1E2838"/>

    <!-- ── NECK ── -->
    <path d="M88 132 Q88 146 100 148 Q112 146 112 132 L110 122 Q100 126 90 122 Z" fill="url(#m_neck)"/>
    <!-- Adam's apple hint -->
    <ellipse cx="100" cy="138" rx="4" ry="2.5" fill="rgba(0,0,0,0.12)"/>
    <!-- Neck shadow -->
    <path d="M88 132 Q85 140 88 147 Q90 143 90 132 Z" fill="rgba(0,0,0,0.1)"/>
    <path d="M112 132 Q115 140 112 147 Q110 143 110 132 Z" fill="rgba(0,0,0,0.1)"/>

    <!-- ── HAIR BACK ── -->
    <path d="M48 80 Q42 105 46 128 Q52 148 64 155 Q68 142 70 128 Q64 112 62 92 Q60 74 64 58 Z" fill="#3A2810"/>
    <path d="M152 80 Q158 105 154 128 Q148 148 136 155 Q132 142 130 128 Q136 112 138 92 Q140 74 136 58 Z" fill="#3A2810"/>

    <!-- ── FACE BASE ── (slightly wider/squarer than female) -->
    <path d="M55 90 Q52 108 54 122 Q56 138 65 148 Q80 158 100 159 Q120 158 135 148 Q144 138 146 122 Q148 108 145 90 Q140 72 100 66 Q60 72 55 90 Z" fill="url(#m_skin)"/>

    <!-- Face shadow sides -->
    <ellipse cx="57" cy="105" rx="10" ry="22" fill="rgba(150,100,50,0.18)" filter="url(#m_softer)"/>
    <ellipse cx="143" cy="105" rx="10" ry="22" fill="rgba(150,100,50,0.18)" filter="url(#m_softer)"/>
    <!-- Jaw shadow -->
    <ellipse cx="100" cy="152" rx="32" ry="9" fill="rgba(140,90,40,0.22)" filter="url(#m_softer)"/>

    <!-- ── HAIR FRONT ── -->
    <!-- Main hair mass -->
    <path d="M55 82 Q58 52 100 44 Q142 52 145 82 Q132 62 118 58 Q110 55 100 55 Q90 55 82 58 Q68 62 55 82 Z" fill="url(#m_hair)"/>
    <!-- Hair shine -->
    <path d="M62 75 Q78 50 100 47 Q122 50 138 75 Q122 58 100 56 Q78 58 62 75 Z" fill="url(#m_hair_shine)" filter="url(#m_soft)"/>

    <!-- Side hair left -->
    <path d="M55 82 Q48 96 48 112 Q52 100 58 90 Z" fill="#4A3418"/>
    <!-- Side hair right -->
    <path d="M145 82 Q152 96 152 112 Q148 100 142 90 Z" fill="#4A3418"/>

    <!-- Textured hair strands -->
    <path d="M72 55 Q68 68 70 82 Q72 70 76 60 Z" fill="#6A5030" opacity="0.6"/>
    <path d="M88 50 Q84 62 86 76 Q88 64 92 54 Z" fill="#7A6040" opacity="0.4"/>
    <path d="M112 50 Q116 62 114 76 Q112 64 108 54 Z" fill="#7A6040" opacity="0.4"/>
    <path d="M128 55 Q132 68 130 82 Q128 70 124 60 Z" fill="#6A5030" opacity="0.6"/>

    <!-- ── EYEBROWS ── (thicker, straighter for male) -->
    <path d="M68 86 Q78 82 90 84" stroke="#3A2810" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M110 84 Q122 82 132 86" stroke="#3A2810" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- Brow inner thickness -->
    <path d="M68 87 Q78 84 90 85.5" stroke="#2A1808" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>
    <path d="M110 85.5 Q122 84 132 87" stroke="#2A1808" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.5"/>

    <!-- ── EYES ── (slightly narrower/more defined for male) -->
    <!-- Left eye socket shadow -->
    <ellipse cx="81" cy="97" rx="14" ry="11" fill="rgba(140,90,40,0.1)" filter="url(#m_soft)"/>
    <!-- Left eye white -->
    <path d="M69 96 Q81 90 93 96 Q81 102 69 96 Z" fill="white"/>
    <ellipse cx="81" cy="96" rx="8" ry="7" fill="url(#m_eye_l)"/>
    <ellipse cx="81" cy="96" rx="5" ry="5" fill="#1A3038"/>
    <ellipse cx="81" cy="96" rx="3" ry="3" fill="#080F12"/>
    <!-- Eye shine -->
    <ellipse cx="78.5" cy="93.5" rx="1.8" ry="1.4" fill="white" opacity="0.9"/>
    <ellipse cx="84" cy="98" rx="0.9" ry="0.7" fill="white" opacity="0.45"/>
    <!-- Upper lid line - stronger for male -->
    <path d="M69 93 Q81 88 93 93" stroke="#1A1008" stroke-width="2" stroke-linecap="round" fill="none"/>
    <!-- Outer lash flick -->
    <path d="M91 93 Q94 91 93 94" stroke="#1A1008" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M70 93 Q67 91 68 94" stroke="#1A1008" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- Right eye socket shadow -->
    <ellipse cx="119" cy="97" rx="14" ry="11" fill="rgba(140,90,40,0.1)" filter="url(#m_soft)"/>
    <!-- Right eye white -->
    <path d="M107 96 Q119 90 131 96 Q119 102 107 96 Z" fill="white"/>
    <ellipse cx="119" cy="96" rx="8" ry="7" fill="url(#m_eye_r)"/>
    <ellipse cx="119" cy="96" rx="5" ry="5" fill="#1A3038"/>
    <ellipse cx="119" cy="96" rx="3" ry="3" fill="#080F12"/>
    <!-- Eye shine -->
    <ellipse cx="116.5" cy="93.5" rx="1.8" ry="1.4" fill="white" opacity="0.9"/>
    <ellipse cx="122" cy="98" rx="0.9" ry="0.7" fill="white" opacity="0.45"/>
    <!-- Upper lid line -->
    <path d="M107 93 Q119 88 131 93" stroke="#1A1008" stroke-width="2" stroke-linecap="round" fill="none"/>
    <path d="M129 93 Q132 91 131 94" stroke="#1A1008" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <path d="M108 93 Q105 91 106 94" stroke="#1A1008" stroke-width="1.5" stroke-linecap="round" fill="none"/>

    <!-- ── NOSE ── (more defined for male) -->
    <!-- Bridge -->
    <path d="M97 106 Q99 112 101 106" stroke="#C08858" stroke-width="1" fill="none" opacity="0.5"/>
    <!-- Nose tip -->
    <ellipse cx="100" cy="118" rx="6" ry="4" fill="rgba(180,120,70,0.2)" filter="url(#m_soft)"/>
    <!-- Nostrils -->
    <path d="M94 117 Q96 120 98 118" stroke="#A07040" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
    <path d="M106 117 Q104 120 102 118" stroke="#A07040" stroke-width="1.2" stroke-linecap="round" fill="none" opacity="0.6"/>
    <ellipse cx="94.5" cy="118" rx="3" ry="2" fill="rgba(150,90,40,0.3)"/>
    <ellipse cx="105.5" cy="118" rx="3" ry="2" fill="rgba(150,90,40,0.3)"/>

    <!-- ── LIPS ── (thinner for male) -->
    <!-- Upper lip -->
    <path d="M88 128 Q94 124 100 125 Q106 124 112 128 Q106 126 100 127 Q94 126 88 128 Z" fill="url(#m_lip)"/>
    <!-- Lower lip -->
    <path d="M88 128 Q94 134 100 135 Q106 134 112 128 Q106 131 100 132 Q94 131 88 128 Z" fill="#B86848"/>
    <!-- Lip line -->
    <path d="M88 128 Q100 130 112 128" stroke="#8A4830" stroke-width="0.8" fill="none" opacity="0.4"/>
    <!-- Subtle chin dimple -->
    <ellipse cx="100" cy="148" rx="4" ry="2" fill="rgba(0,0,0,0.08)" filter="url(#m_soft)"/>

    <!-- ── LIGHT STUBBLE HINT ── -->
    <ellipse cx="84" cy="132" rx="8" ry="5" fill="rgba(80,50,20,0.07)" filter="url(#m_softer)"/>
    <ellipse cx="116" cy="132" rx="8" ry="5" fill="rgba(80,50,20,0.07)" filter="url(#m_softer)"/>
    <ellipse cx="100" cy="138" rx="10" ry="4" fill="rgba(80,50,20,0.06)" filter="url(#m_softer)"/>

    <!-- ── FOREHEAD HIGHLIGHT ── -->
    <ellipse cx="100" cy="76" rx="22" ry="10" fill="rgba(255,220,180,0.08)" filter="url(#m_softer)"/>

  </g>

  <!-- Rim light -->
  <circle cx="100" cy="100" r="98" fill="none" stroke="rgba(100,160,220,0.07)" stroke-width="2"/>
</svg>
